# Configuracion global — la reciben todos los microservicios

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info

app:
  mensaje: "Configuracion cargada desde el Config Server"
  ambiente: ${AMBIENTE:desarrollo}
